<div class="bg-white rounded-lg shadow-lg overflow-hidden w-full flex flex-col max-w-xs sm:max-w-sm md:max-w-md lg:max-w-lg mx-auto min-h-[420px] sm:min-h-[460px] md:min-h-[500px]">
  <div>
    <img [src]="image" class="w-full object-cover h-56 sm:h-64 md:h-72 lg:h-80" />
  </div>
  <div class="p-4 flex flex-col gap-2">
    <div class="text-lg sm:text-xl font-semibold truncate">
      {{ optionName }}
    </div>
    <div class="text-base sm:text-lg text-gray-700">
      {{ price | currency : "INR" }}
    </div>
    <div class="text-sm sm:text-base text-gray-500">
      Delivery Date: {{ Delivery_date }}
    </div>
    <div class="mt-4 flex flex-col sm:flex-row gap-2">
      <button
        pButton
        type="button"
        label="Add to cart"
        icon="pi pi-shopping-cart"
        class="p-button-raised flex items-center justify-center"
      ></button>
      <button
        pButton
        type="button"
        label="Remove from cart"
        icon="pi pi-times"
        class="p-button-raised flex items-center justify-center"
      ></button>
    </div>
  </div>
</div>
